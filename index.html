<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Forever Young - France</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 1rem;
      font-size: 1.5rem;
      font-weight: 600;
      background: #181818;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .viewer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #pageImage {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .page-label {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      background: rgba(0,0,0,0.55);
      padding: 0.4rem 0.7rem;
      border-radius: 0.4rem;
      font-size: 0.9rem;
      pointer-events: none;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 10;
    }

    .nav-btn.left { left: 1rem; }
    .nav-btn.right { right: 1rem; }

    .nav-btn:hover {
      background: rgba(255,255,255,0.15);
    }

  </style>
</head>

<body>

<header>Forever Young - France (ajout régulier de pages)</header>

<div class="viewer">

<button class="nav-btn left" id="prevBtn">&#8592;</button>

<img id="pageImage" alt="Page BD">

<div class="page-label" id="pageLabel">
Page 1
</div>

<button class="nav-btn right" id="nextBtn">&#8594;</button>

</div>

<script>

let images = [];

let current = 0;

const imgEl = document.getElementById("pageImage");
const pageLabel = document.getElementById("pageLabel");

const extensions = [
  "jpg",
  "jpeg",
  "png",
  "webp"
];

async function loadImages(){

  let i = 1;

  while(true){

    let found = false;

    for(let ext of extensions){

      let file = "bande_d" + i + "." + ext;

      let ok = await checkImage(file);

      if(ok){
        images.push(file);
        found = true;
        break;
      }

    }

    if(!found){
      break;
    }

    i++;

  }

  const aSuivreExiste = await checkImage("a_suivre.png");

  if(aSuivreExiste){
    images.push("a_suivre.png");
  }

  if(images.length === 0){

    pageLabel.textContent =
    "Aucune image trouvée";

    return;

  }

  update();

}

function checkImage(src){

 return new Promise(resolve => {

   let test = new Image();

   test.onload = () => resolve(true);

   test.onerror = () => resolve(false);

   test.src = src;

 });

}

function update(){

 imgEl.src = images[current];

 pageLabel.textContent =
 "Page " + (current + 1) +
 " / " + images.length;

}

function next(){

 if(current < images.length - 1){

   current++;

   update();

 }

}

function prev(){

 if(current > 0){

   current--;

   update();

 }

}

document.getElementById("nextBtn").onclick = next;

document.getElementById("prevBtn").onclick = prev;

window.addEventListener("wheel",(e)=>{

 if(Math.abs(e.deltaX)>Math.abs(e.deltaY)){

   if(e.deltaX>0) next();
   else prev();

 }

},{passive:true});

let startX=null;

document.querySelector(".viewer")
.addEventListener("touchstart",e=>{

 startX=e.touches[0].clientX;

});

document.querySelector(".viewer")
.addEventListener("touchend",e=>{

 const diff =
 e.changedTouches[0].clientX-startX;

 if(Math.abs(diff)>40){

   if(diff<0) next();
   else prev();

 }

 startX=null;

});

loadImages();

</script>

</body>
</html>
